<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Mulish:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #f1f5f9;
  color: #0f172a;
  font-family: 'Mulish', sans-serif;
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
  background-image:
    radial-gradient(ellipse 60% 50% at 30% 30%, rgba(37,99,235,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 70% 70%, rgba(37,99,235,0.04) 0%, transparent 70%),
    linear-gradient(rgba(148,163,184,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(148,163,184,0.07) 1px, transparent 1px);
  background-size: 100% 100%, 100% 100%, 50px 50px, 50px 50px;
}
.card {
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 20px;
  padding: 48px 44px;
  width: 400px;
  box-shadow: 0 8px 32px rgba(0,0,0,.1);
}
.logo {
  display:flex; align-items:center; gap:12px; margin-bottom:32px;
}
.logo-box {
  width:46px; height:46px;
  background:linear-gradient(135deg,#1d4ed8,#2563eb);
  border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:24px;
}
.logo-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:26px; letter-spacing:3px; color:#2563eb;
}
.logo-sub { font-size:10px; color:#64748b; letter-spacing:2px; text-transform:uppercase; }
h2 { font-size:22px; font-weight:900; margin-bottom:24px; color:#0f172a; }
.form-group { margin-bottom:18px; }
label { display:block; font-size:11px; font-weight:700; color:#64748b; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
input[type=text], input[type=password] {
  width:100%; padding:13px 16px;
  background:#f8fafc; border:1.5px solid #e2e8f0; border-radius:12px;
  color:#0f172a; font-family:'Mulish',sans-serif; font-size:14px;
  outline:none; transition:border-color 0.2s;
}
input:focus { border-color:#2563eb; background:#ffffff; }
.btn-login {
  width:100%; padding:14px;
  background:linear-gradient(135deg,#1d4ed8,#2563eb);
  border:none; border-radius:12px;
  color:#fff; font-family:'Mulish',sans-serif; font-size:15px; font-weight:800;
  cursor:pointer; letter-spacing:1px;
  transition:opacity 0.2s, transform 0.1s;
  margin-top:8px;
}
.btn-login:hover { opacity:0.9; }
.btn-login:active { transform:scale(0.99); }
.error-msg {
  background:#fef2f2; border:1px solid rgba(220,38,38,0.3);
  border-radius:10px; padding:12px 16px;
  font-size:13px; color:#dc2626; margin-bottom:18px;
}
.back-link {
  display:block; text-align:center; margin-top:20px;
  font-size:12px; color:#64748b; text-decoration:none;
}
.back-link:hover { color:#2563eb; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-box">🔐</div>
    <div>
      <div class="logo-title">ADMIN</div>
      <div class="logo-sub">Jadval boshqaruvi</div>
    </div>
  </div>
  <h2>Tizimga kirish</h2>

  {% if messages %}
  {% for msg in messages %}
  <div class="error-msg">⚠️ {{ msg }}</div>
  {% endfor %}
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Login</label>
      <input type="text" name="username" placeholder="username" required autofocus>
    </div>
    <div class="form-group">
      <label>Parol</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-login">KIRISH →</button>
  </form>

  <a href="/" class="back-link">← Asosiy sahifaga qaytish</a>
</div>
</body>
</html>
